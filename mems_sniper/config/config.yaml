# ============================================================
#  MemeCoin Sniper - Configuration
#  YAML format. Override sensitive values with .env file.
# ============================================================

project:
  name: "MemeCoin Sniper - Multi-Exchange Multi-TF Pump Hunter"
  version: "1.0.0"
  log_level: "INFO"          # DEBUG | INFO | WARNING | ERROR
  data_dir: "data"
  sqlite_path: "data/sniper.sqlite"

# ------------------------------------------------------------
# Exchanges (ccxt unified API).
# Set API keys in .env, NOT here.
# ------------------------------------------------------------
exchanges:
  binance:
    enable: true
    sandbox: false          # use testnet
    rate_limit: true
    options:
      defaultType: "future"   # futures mode — leverage trading
    watch_symbols_mode: "top_volume"   # only top coins by volume
    top_volume_limit: 100     # top 100 Binance futures coins
    custom_symbols: []
    ws_endpoint: "wss://fstream.binance.com/ws"

  bybit:
    enable: true
    sandbox: false
    rate_limit: true
    options:
      defaultType: "spot"
    watch_symbols_mode: "top_volume"
    top_volume_limit: 80
    ws_endpoint: "wss://stream.bybit.com/v5/public/spot"

# ------------------------------------------------------------
# DEX (decentralized exchanges)
# ------------------------------------------------------------
dex:
  enabled: true
  enabled_dexes:
    - "pumpfun"
    - "raydium"
    - "pancakeswap"
    - "uniswap"
  enabled_chains:
    - "solana"
    - "bsc"
    - "ethereum"
  min_liquidity_usd: 10_000
  min_volume_1h_usd: 1_000
  max_age_hours: 24
  discovery_interval_minutes: 5
  price_poll_interval_seconds: 30
  max_tracked_tokens: 200
  meme_keywords: []

# Universe filter
universe:
  meme_keywords:
    - "DOGE"
    - "SHIB"
    - "PEPE"
    - "FLOKI"
    - "BONK"
    - "WIF"
    - "MEME"
    - "TURBO"
    - "NEIRO"
    - "BOOK"
  include_new_listed_hours: 72
  min_quote_volume_24h: 1_000_000
  max_quote_volume_24h: 500_000_000
  futures_only: true
  # ── سیگنال‌ها فقط روی ۱۰۰ ارز پرحجم فیوچرز ──
  futures_universe_size: 100

# ------------------------------------------------------------
# Multi-timeframe confluence — سیگنال‌های ساعتی با وین ریت بالا
# تایم‌فریم‌های ۱h + ۴h برای تأیید روند
# ------------------------------------------------------------
timeframes:
  - "1h"
  - "4h"

# trigger = 1h برای سیگنال‌های ساعتی
trigger_timeframe: "1h"

# Weight of each timeframe in the confluence score
confluence_weights:
  "1h": 0.60
  "4h": 0.40

# ------------------------------------------------------------
# Strategy parameters
# ------------------------------------------------------------
strategies:
  new_listing_sniper:
    enabled: true
    max_age_hours: 72
    first_candle_min_pct: 5.0
    weight: 1.5

  volume_spike:
    enabled: true
    multiplier: 3.0
    rolling_window: 20
    weight: 1.0

  orderbook_imbalance:
    enabled: true
    bid_ask_ratio_threshold: 2.2
    depth_levels: 20
    weight: 1.0

  liquidity_grab:
    enabled: false
    swing_lookback: 50
    wick_pierce_pct: 0.2
    weight: 1.0

  momentum_ignition:
    enabled: false
    first_body_min_pct: 4.0
    confirm_body_min_pct: 2.0
    weight: 1.0

  rsi_divergence:
    enabled: true
    rsi_length: 14
    lookback: 50
    weight: 0.8

  bb_breakout:
    enabled: true
    bb_length: 20
    bb_std: 2.0
    breakout_buffer_pct: 0.1
    weight: 0.8

  funding_oi_spike:
    enabled: true
    funding_change_threshold: 0.0005
    oi_spike_multiplier: 1.5
    weight: 1.0

  social_momentum:
    enabled: false
    min_momentum: 0.4
    min_mentions: 10
    weight: 0.8

  ema_cross:
    enabled: true
    fast_length: 9
    slow_length: 21
    weight: 1.1

  adx_trend:
    enabled: true
    adx_threshold: 25
    adx_length: 14
    weight: 1.0

  squeeze_momentum:
    enabled: true
    bb_length: 20
    kc_length: 20
    kc_mult: 1.5
    weight: 0.9

  vwap:
    enabled: false
    deviation_pct: 0.5
    weight: 0.8

  macd_crossover:
    enabled: true
    fast: 12
    slow: 26
    signal: 9
    weight: 1.2

  stoch_rsi:
    enabled: true
    rsi_length: 14
    stoch_length: 14
    oversold: 20
    overbought: 80
    weight: 1.0

  obv_divergence:
    enabled: false
    length: 20
    weight: 0.9

  sr_bounce:
    enabled: true
    lookback: 30
    threshold_pct: 1.5
    weight: 1.1

  volume_trend:
    enabled: true
    short_window: 5
    long_window: 20
    min_ratio: 1.5
    weight: 0.8

  news_sentiment:
    enabled: true
    weight: 1.2

# امتیاز حداقل برای فیوچرز ساعتی — بالا برای وین ریت بهتر
min_signal_score: 0.68

# ------------------------------------------------------------
# Risk management
# ------------------------------------------------------------
risk:
  risk_per_trade_pct: 1.0
  initial_paper_balance: 10000.0
  atr_length: 14
  stop_loss_atr_mult: 1.5
  take_profit_atr_mult: 2.5
  tp1_atr_mult: 1.0
  tp2_atr_mult: 1.8
  tp3_atr_mult: 2.5
  risk_free_after_tp1: true
  trailing_activate_atr_mult: 1.5
  trailing_atr_mult: 0.8
  max_open_positions: 4
  daily_max_loss_pct: 5.0
  max_position_age_seconds: 14400   # 4h برای سیگنال‌های ساعتی

# ------------------------------------------------------------
# Backtest
# ------------------------------------------------------------
backtest:
  history_candles: 2000
  fee_pct: 0.075
  slippage_pct: 0.05

# ------------------------------------------------------------
# Forward / live paper-trading
# ------------------------------------------------------------
forward:
  universe_refresh_minutes: 15
  poll_interval_seconds: 30
  signal_cooldown_seconds: 3600

# ------------------------------------------------------------
# Web dashboard
# ------------------------------------------------------------
web:
  host: "0.0.0.0"
  port: 8080
  cors_origins: ["*"]
  require_token: false

# ------------------------------------------------------------
# Telegram notifications
# ------------------------------------------------------------
telegram:
  enabled: false
  parse_mode: "HTML"

# ------------------------------------------------------------
# Social momentum tracking
# ------------------------------------------------------------
social:
  enabled: false
  scan_interval_minutes: 30
  max_symbols: 20
  nitter_instances:
    - "https://nitter.privacydev.net"
    - "https://nitter.poast.org"

# ------------------------------------------------------------
# Fundamentals
# ------------------------------------------------------------
fundamentals:
  enabled: true
  fear_greed_url: "https://api.alternative.me/fng/?limit=2"
  coingecko_trending_url: "https://api.coingecko.com/api/v3/search/trending"
  scan_interval_seconds: 300
  fear_greed_weight: 0.15
  trending_boost: 0.10

# ------------------------------------------------------------
# Parquet data logger
# ------------------------------------------------------------
parquet:
  enabled: true
  flush_interval_seconds: 60

# ------------------------------------------------------------
# Meme Hunter — شکار میم‌کوین‌های پامپی (۱۰ استراتژی)
# ------------------------------------------------------------
meme_hunter:
  enabled: true
  scan_interval_seconds: 30

  pre_pump_max_age_seconds: 1800
  pre_pump_min_volume_growth: 1.5
  pre_pump_min_holder_growth: 1.2
  pre_pump_max_dev_pct: 20.0
  pre_pump_min_liquidity_usd: 3000
  pre_pump_requires_locked_liq: false

  post_migration_min_age_seconds: 3600
  post_migration_max_age_seconds: 86400
  post_migration_min_volume_1h: 10000
  post_migration_min_liquidity: 15000
  post_migration_min_txns_1h: 50

  smart_money_min_wallets: 2
  smart_money_known_wallets: []

  narrative_keywords:
    - "AI"
    - "GROK"
    - "TRUMP"
    - "ELON"
    - "MUSK"
    - "DOGE"
    - "PEPE"
    - "SHIB"
    - "CAT"
    - "DOG"
    - "FROG"
    - "WIF"
    - "BONK"
    - "NEIRO"
    - "FLOKI"
    - "SPX"
    - "GIGA"
  narrative_min_score: 0.50

  max_results_per_strategy: 10

# ------------------------------------------------------------
# Scalping — اسکلپ روی ۲۰۰ ارز برتر — spot + futures — 5m
# ------------------------------------------------------------
scalping:
  enabled: true
  # اسکن روی ۲۰۰ ارز برتر به جای ۳۰
  top_volume_limit: 200
  # تایم‌فریم پایین برای اسکلپ
  timeframes:
    - "5m"
    - "15m"
  trigger_timeframe: "5m"
  # Confluence weights
  confluence_weights:
    "5m": 0.65
    "15m": 0.35
  # امتیاز کمتر برای بیشتر سیگنال دادن در اسکلپ
  min_signal_score: 0.30
  # SL/TP تنگ برای اسکلپ
  sl_atr_mult: 0.8
  tp_atr_mult: 1.5
  atr_length: 7
  # cooldown کوتاه برای اسکلپ
  signal_cooldown_seconds: 180   # 3 دقیقه
  # ریسک کوچک در اسکلپ
  risk_per_trade_pct: 0.5
  # پوزیشن‌های همزمان
  max_open_positions: 6
  # حداقل استراتژی‌های مختلف برای سیگنال
  min_unique_strategies: 2
  # فیلتر حجم
  min_volume_ratio: 1.2
  # HTF filter خاموش — برای هر دو جهت سیگنال بده
  use_htf_trend_filter: false
  htf_timeframes:
    - "1h"
    - "4h"
  # spot و futures هر دو — از Binance spot + futures
  include_spot: true
  include_futures: true

  strategies:
    scalp_vwap_rejection:
      enabled: true
      weight: 1.2
      deviation_pct: 0.15
      wick_ratio: 0.65
    scalp_rsi_extreme:
      enabled: true
      weight: 1.1
      rsi_length: 7
      oversold: 18
      overbought: 82
    scalp_momentum_burst:
      enabled: true
      weight: 1.0
      body_min_pct: 0.3
      volume_multiplier: 2.0
    scalp_stoch_extreme:
      enabled: true
      weight: 1.0
      rsi_length: 7
      stoch_length: 7
      oversold: 12
      overbought: 88
    scalp_ema_ribbon:
      enabled: true
      weight: 0.9
      fast: 3
      mid: 5
      slow: 8
    scalp_bb_touch:
      enabled: true
      weight: 1.0
      bb_length: 15
      bb_std: 2.0
    scalp_volume_climax:
      enabled: true
      weight: 1.1
      volume_multiplier: 4.0
    scalp_order_flow:
      enabled: true
      weight: 1.0
      depth_levels: 10
      imbalance_threshold: 2.5
    scalp_squeeze_release:
      enabled: true
      weight: 1.0
    scalp_engulfing:
      enabled: true
      weight: 0.9

# ------------------------------------------------------------
# Assistant
# ------------------------------------------------------------
assistant:
  verbosity: "normal"
  risk_warn_drawdown_pct: 3.0
  use_llm: false
  llm_model: "gpt-4o-mini"
  llm_max_tokens: 500
  llm_temperature: 0.7

# =============================================================
# LIT (Liquidity Inducement Theorem) Strategy Engine
# =============================================================
lit:
  enabled: true
  universe_size: 20
  special_symbols:
    - "PAXG/USDT"
  timeframes:
    - "15m"
    - "1h"
    - "4h"
  trigger_timeframe: "15m"
  sl_atr_mult: 1.0
  tp_atr_mult: 2.0
  tp2_atr_mult: 3.0
  risk_per_trade_pct: 1.0
  initial_balance: 10000
  max_hold_bars: 50
  min_score: 0.70
  cooldown_seconds: 1800
  max_open_positions: 3
  evaluation_interval_seconds: 300
